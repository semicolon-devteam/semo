name: Build & Push SEMO Dashboard Docker Image

on:
  push:
    branches:
      - feat/135-semo-dashboard-phase1
      - main
    paths:
      - 'packages/semo-dashboard/**'
      - '.github/workflows/docker-build-semo-dashboard.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - prd

env:
  DOCKER_IMAGE: semicolonmanager/semo-dashboard
  WORKING_DIR: packages/semo-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prd"
          else
            ENV="dev"
          fi
          
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "env=${ENV}" >> $GITHUB_OUTPUT
          echo "tag=${ENV}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest=${ENV}-latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Update Kustomize image tag
        if: steps.tag.outputs.env == 'dev'
        run: |
          cd /tmp
          git clone https://github.com/semicolon-devteam/semi-colon-ops.git
          cd semi-colon-ops
          
          # Update dev overlay
          sed -i "s|newTag:.*|newTag: ${{ steps.tag.outputs.tag }}|" \
            semo-dashboard/overlays/dev/kustomization.yaml
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add semo-dashboard/overlays/dev/kustomization.yaml
          git commit -m "chore: Update semo-dashboard dev image to ${{ steps.tag.outputs.tag }}"
          git push https://${{ secrets.SOURCE_REPO_TOKEN }}@github.com/semicolon-devteam/semi-colon-ops.git main

      - name: Summary
        run: |
          echo "## Docker Image Build Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.tag.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Tag**: \`${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.latest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- ArgoCD will auto-sync in ~3 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Check deployment: \`kubectl get pods -n semo\`" >> $GITHUB_STEP_SUMMARY
